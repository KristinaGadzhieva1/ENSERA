document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-digest { grid-template-columns: 1fr 1fr !important; }\n    .ens-pad { padding-left: 16px !important; padding-right: 16px !important; padding-top: 18px !important; }\n    .ens-scrollx { overflow-x: auto !important; }\n    .ens-scrollx > div { min-width: 720px; }\n    .ens-appwrap { flex-direction: column !important; }\n    .ens-applist { width: auto !important; max-height: none !important; }\n    .ens-casehdr { flex-direction: column !important; align-items: stretch !important; }\n    .ens-docwrap { flex-direction: column !important; }\n    .ens-docpanel { width: auto !important; position: static !important; }\n    /* cases: card list instead of table */\n    .ens-hide-sm { display: none !important; }\n    .ens-show-sm { display: flex !important; }\n    /* calendar: stack + horizontal-scroll grid */\n    .ens-calwrap { flex-direction: column !important; }\n    .ens-calside { width: auto !important; }\n    .ens-calside-title { margin-top: 8px !important; }\n    .ens-calscroll { overflow-x: auto !important; }\n    .ens-calgrid { min-width: 620px; }\n    /* settings agent card: stack */\n    .ens-agentcard { flex-wrap: wrap !important; align-items: flex-start !important; }\n    .ens-agentauto { width: 100% !important; order: 3; }\n    /* copilot window fits viewport */\n    .ens-copilot { width: auto !important; left: 12px !important; right: 12px !important; bottom: 12px !important; height: 70vh !important; }\n  }\n  @media (max-width: 1080px) {\n    .ens-appwrap { flex-direction: column !important; }\n    .ens-applist { width: auto !important; max-height: none !important; }\n  }\n  @media (max-width: 560px) {\n    .ens-digest { grid-template-columns: 1fr !important; }\n    .ens-docstats { grid-template-columns: 1fr !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; min-height:100vh; background:#FBFDFF; position:relative;\">\n\n  <!-- ===================== SIDEBAR ===================== -->\n  <aside class=\"ens-sidebar {{ sidebarClass }}\" style=\"width:248px; flex:none; background:#fff; border-right:1px solid #ECF1F7; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;\">\n    <div style=\"padding:22px 20px 18px; display:flex; align-items:center; gap:10px; cursor:pointer;\" onclick=\"{{ goDashboard }}\">\n      <span class=\"wm\" style=\"font-size:24px;\">ENSERA<\u002Fspan>\n    <\u002Fdiv>\n\n    <nav style=\"padding:8px 12px; display:flex; flex-direction:column; gap:2px; flex:1; overflow-y:auto;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ navTo }}\" data-route=\"{{ item.route }}\" style=\"display:flex; align-items:center; gap:11px; padding:10px 13px; border-radius:10px; font-size:13.5px; cursor:pointer; color:{{ item.color }}; background:{{ item.bg }}; font-weight:{{ item.weight }};\">\n          <span style=\"width:5px; height:18px; border-radius:4px; flex:none; background:{{ item.bar }};\"><\u002Fspan>\n          <span innerhtml=\"{{ item.icon }}\" style=\"display:flex; width:17px; height:17px; flex:none; color:{{ item.iconColor }};\"><\u002Fspan>\n          <span style=\"flex:1;\">{{ item.label }}<\u002Fspan>\n          <sc-if value=\"{{ item.badge }}\" hint-placeholder-val=\"\">\n            <span style=\"background:#F59E0B; color:#0B1F3A; font-size:10px; font-weight:800; padding:1px 7px; border-radius:20px;\">{{ item.badge }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"padding:14px 14px 18px;\">\n      <div style=\"display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:12px; background:#F4F8FC; border:1px solid #ECF1F7;\">\n        <div style=\"width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#22C29B,#1E88E5); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:14px; flex:none;\">TB<\u002Fdiv>\n        <div style=\"flex:1; min-width:0;\">\n          <div style=\"font-size:13px; font-weight:700; color:#0B1F3A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">Thomas Berger<\u002Fdiv>\n          <div style=\"font-size:11px; color:#94A3B8; font-weight:600;\">Energy consultant<\u002Fdiv>\n        <\u002Fdiv>\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"color:#94A3B8; flex:none;\"><path d=\"M6 9l6 6 6-6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- mobile drawer overlay -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"\">\n    <div onclick=\"{{ closeDrawer }}\" style=\"position:fixed; inset:0; background:rgba(11,31,58,.42); z-index:120;\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== MAIN ===================== -->\n  <main style=\"flex:1; min-width:0; display:flex; flex-direction:column;\">\n\n    <!-- topbar -->\n    <header style=\"height:64px; flex:none; background:rgba(251,253,255,.85); backdrop-filter:blur(8px); border-bottom:1px solid #F0F4F9; display:flex; align-items:center; padding:0 18px; gap:14px; position:sticky; top:0; z-index:20;\">\n      <button onclick=\"{{ toggleDrawer }}\" class=\"ens-hamburger\" style=\"width:38px; height:38px; border-radius:10px; border:1px solid #E2EAF3; background:#fff; cursor:pointer; align-items:center; justify-content:center; flex:none; padding:0;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 6h16M4 12h16M4 18h16\" stroke=\"#0B1F3A\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div style=\"font-size:16px; font-weight:800; color:#0B1F3A;\">{{ pageTitle }}<\u002Fdiv>\n      <span class=\"ens-search-top\" style=\"font-size:12.5px; color:#94A3B8;\">{{ pageSub }}<\u002Fspan>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <button onclick=\"{{ startDemo      <div class=\"ens-casehdr-wrap\" style=\"background:#fff; border:1px solid #EEF2F7; border-radius:16px; box-shadow:0 4px 20px rgba(11,31,58,.04); padding:22px 26px; margin-bottom:18px; {{ ringCasehdr }}\">\n          <div style=\"display:flex; align-items:flex-start; gap:20px;\">\n            <div style=\"flex:1;\">\n              <div style=\"display:flex; align-items:center; gap:12px;\">\n                <span style=\"font-size:22px; font-weight:800; color:#0B1F3A;\">{{ caseObj.name }}<\u002Fspan>\n                <span style=\"font-size:11.5px; font-weight:700; color:{{ caseObj.stFg }}; background:{{ caseObj.stBg }}; border-radius:20px; padding:4px 12px;\">{{ caseObj.status }}<\u002Fspan>\n                <span style=\"font-size:11.5px; font-weight:600; color:#475569; background:#F4F8FC; border:1px solid #ECF1F7; border-radius:7px; padding:4px 10px;\">{{ caseObj.path }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:26px; margin-top:16px;\">\n                <div><div style=\"font-size:11px; color:#94A3B8; font-weight:600; text-transform:uppercase; letter-spacing:.04em;\">Current milestone<\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:#0B1F3A; margin-top:3px;\">{{ caseObj.milestone }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:11px; color:#94A3B8; font-weight:600; text-transform:uppercase; letter-spacing:.04em;\">Deadline<\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:#0B1F3A; margin-top:3px;\">{{ caseObj.deadline }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:11px; color:#94A3B8; font-weight:600; text-transform:uppercase; letter-spacing:.04em;\">Critical blockers<\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:{{ caseObj.blockerColor }}; margin-top:3px;\">{{ caseObj.blockerCount }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:16px; background:#F0FBFF; border:1px solid #D6EEFA; border-radi olor:#15803D; background:#DCFCE7; border:none; border-radius:8px; padding:8px 12px; cursor:pointer;\">Mark reviewed<\u002Fbutton>\n                <button style=\"font-family:inherit; font-size:11.5px; font-weight:700; color:#1E88E5; background:#EEF6FD; border:1px solid #D6EAFB; border-radius:8px; padding:8px 12px; cursor:pointer;\">Request correction<\u002Fbutton>\n                <button style=\"font-family:inherit; font-size:11.5px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:8px; padding:8px 12px; cursor:pointer;\">Replace document<\u002Fbutton>\n                <button onclick=\"{{ askCopilotDoc }}\" style=\"font-family:inherit; font-size:11.5px; font-weight:700; color:#fff; background:#0B1F3A; border:none; border-radius:8px; padding:8px 12px; cursor:pointer;\">Ask Copilot<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-size:10px; color:#B6C2D4; margin-top:14px;\">Checked by Document Validation Agent · Manual review recommended<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== APPROVAL QUEUE ===================== -->\n      <sc-if value=\"{{ isApprovals }}\" hint-placeholder-val=\"\">\n      <div class=\"ens-pad\" style=\"padding:28px 34px 60px; max-width:1240px;\">\n        <div style=\"font-size:22px; font-weight:800; color:#0B1F3A;\">Approval Queue<\u002Fdiv>\n        <div style=\"font-size:13px; color:#94A3B8; margin:3px 0 20px;\">Everything ENSERA's agents have prepared is waiting for your approval.<\u002Fdiv>\n\n        <div class=\"ens-appwrap\" style=\"display:flex; gap:18px; align-items:flex-start;\">\n\n          <!-- LEFT: pending list -->\n          <div class=\"ens-applist\" style=\"width:340px; flex:none; background:#fff; border:1px solid #EEF2F7; border-radius:16px; box-shadow:0 4px 20px rgba(11,31,58,.04); overflow:hidden;\">\n            <div style=\"padding:15px 18px; border-bottom:1px solid #F0F4F9; display:flex; align-items:center; gap:9px;\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M3 13l3-8h12l3 8M3 13v6h18v-6M3 13h5l1 2h6l1-2h5\" stroke=\"#0B1F3A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:13.5px; font-weight:800; color:#0B1F3A;\">Pending ({{ pendingApprovalCount }})<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ pendingList }}\" as=\"a\" hint-placeholder-count=\"5\">\n              <div onclick=\"{{ selectApproval }}\" data-id=\"{{ a.id }}\" style=\"padding:13px 16px; border-top:1px solid #F4F7FB; border-left:3px solid {{ a.selBorder }}; background:{{ a.selBg }}; cursor:pointer; display:flex; gap:11px;\">\n                <span style=\"width:32px; height:32px; border-radius:9px; background:#EFF4FF; display:flex; align-items:center; justify-content:center; flex:none;\"><span innerhtml=\"{{ a.icon }}\" style=\"display:flex;\"><\u002Fspan><\u002Fspan>\n                <div style=\"flex:1; min-width:0;\">\n                  <div style=\"font-size:13px; font-weight:700; color:#0B1F3A; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ a.title }}<\u002Fdiv>\n                  <div style=\"font-size:11px; color:#94A3B8; margin:1px 0 5px;\">{{ a.case }}<\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#38BDF8; flex:none;\"><\u002Fspan><span style=\"font-size:11px; color:#94A3B8;\">{{ a.agent }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noPending }}\" hint-placeholder-val=\"\">\n              <div style=\"padding:34px 18px; text-align:center; color:#94A3B8; font-size:12.5px;\">Nothing waiting. You're all caught up.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- RIGHT: detail -->\n          <sc-if value=\"{{ selectedApproval }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:1; min-width:0; background:#fff; border:1px solid #EEF2F7; border-radius:16px; box-shadow:0 4px 20px rgba(11,31,58,.04); padding:24px 26px;\">\n            <div style=\"display:flex; align-items:flex-start; gap:14px;\">\n              <div style=\"flex:1;\">\n                <div style=\"font-size:18px; font-weight:800; color:#0B1F3A; line-height:1.3;\">{{ selectedApproval.title }}<\u002Fdiv>\n                <div onclick=\"{{ openCaseEvt }}\" data-id=\"{{ selectedApproval.caseId }}\" style=\"font-size:13px; font-weight:600; color:#1E88E5; margin-top:6px; cursor:pointer; display:inline-block;\">{{ selectedApproval.case }} →<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-size:11px; font-weight:700; color:{{ selectedApproval.confFg }}; background:{{ selectedApproval.confBg }}; border:1px solid {{ selectedApproval.confBg }}; border-radius:8px; padding:5px 11px; flex:none;\">Confidence: {{ selectedApproval.confidence }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:8px; margin:16px 0 18px;\">\n              <span style=\"width:6px; height:6px; border-radius:50%; background:#38BDF8; flex:none;\"><\u002Fspan>\n              <span style=\"font-size:12px; color:#64748B;\">Prepared by {{ selectedApproval.agent }}<\u002Fspan>\n              <span style=\"font-size:11px; color:#CBD5E1;\">·<\u002Fspan>\n              <span style=\"font-size:12px; color:#94A3B8;\">Waiting for Thomas's approval<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"background:#F9FBFD; border:1px solid #EEF2F7; border-radius:12px; padding:18px 20px;\">\n              <sc-for list=\"{{ selectedApproval.body }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"font-size:13.5px; color:#334155; line-height:1.65; margin-bottom:12px;\">{{ p }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"background:#EEF4FF; border:1px solid #DCE6FB; border-radius:12px; padding:14px 16px; margin-top:14px;\">\n              <div style=\"font-size:12.5px; font-weight:800; color:#0B1F3A; margin-bottom:4px;\">Why this was prepared<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#475569; line-height:1.5;\">{{ selectedApproval.why }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; flex-wrap:wrap; gap:9px; margin-top:18px; padding-top:18px; border-top:1px solid #F0F4F9; align-items:center;\">\n              <button onclick=\"{{ approveItem }}\" data-id=\"{{ selectedApproval.id }}\" style=\"font-family:inherit; font-size:13px; font-weight:700; color:#fff; background:#22A06B; border:none; border-radius:10px; padding:10px 20px; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l4 4L19 7\" stroke=\"#fff\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Approve<\u002Fbutton>\n              <button onclick=\"{{ rejectItem }}\" data-id=\"{{ selectedApproval.id }}\" style=\"font-family:inherit; font-size:13px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:10px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 6l12 12M18 6L6 18\" stroke=\"#64748B\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Reject<\u002Fbutton>\n              <button style=\"font-family:inherit; font-size:13px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:10px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 20l4-1 11-11-3-3L5 16l-1 4z\" stroke=\"#64748B\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Edit<\u002Fbutton>\n              <button onclick=\"{{ openCaseEvt }}\" data-id=\"{{ selectedApproval.caseId }}\" style=\"font-family:inherit; font-size:13px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:10px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"3\" stroke=\"#64748B\" stroke-width=\"2\"><\u002Fcircle><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z\" stroke=\"#64748B\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>Review in case<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#94A3B8; margin-top:14px;\">Critical actions always require approval.<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== CALENDAR ===================== -->\n      <sc-if value=\"{{ isCalendar }}\" hint-placeholder-val=\"\">\n      <div class=\"ens-pad ens-calwrap\" style=\"padding:28px 34px 60px; max-width:1380px; display:flex; gap:18px;\">\n        <div style=\"flex:1; min-width:0;\">\n          <div style=\"font-size:22px; font-weight:800; color:#0B1F3A;\">June 2026<\u002Fdiv>\n          <div style=\"font-size:13px; color:#94A3B8; margin:3px 0 18px;\">Deadlines, follow-ups and reviews — each event links back to its case.<\u002Fdiv>\n          <div class=\"ens-calscroll\" style=\"background:#fff; border:1px solid #EEF2F7; border-radius:16px; box-shadow:0 4px 20px rgba(11,31,58,.04); padding:18px; overflow:hidden;\">\n            <div class=\"ens-calgrid\">\n            <div style=\"display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:8px;\">\n              <div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">MON<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">TUE<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">WED<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">THU<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">FRI<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">SAT<\u002Fdiv><div style=\"font-size:10.5px; font-weight:700; color:#94A3B8; text-align:center;\">SUN<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(7,1fr); gap:6px;\">\n              <sc-for list=\"{{ calCells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n                <sc-if value=\"{{ cell.blank }}\" hint-placeholder-val=\"\">\n                  <div style=\"min-height:78px;\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ cell.day }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"min-height:78px; border:1px solid {{ cell.cellBorder }}; border-radius:10px; padding:6px 7px; background:{{ cell.cellBg }};\">\n                    <div style=\"font-size:11.5px; font-weight:700; color:{{ cell.dayColor }}; margin-bottom:4px;\">{{ cell.day }}<\u002Fdiv>\n                    <sc-for list=\"{{ cell.events }}\" as=\"ev\" hint-placeholder-count=\"1\">\n                      <div style=\"font-size:9.5px; font-weight:600; color:#fff; background:{{ ev.color }}; border-radius:5px; padding:2px 5px; margin-bottom:3px; line-height:1.3; overflow:hidden;\">{{ ev.title }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ens-calside\" style=\"width:300px; flex:none;\">\n          <div class=\"ens-calside-title\" style=\"font-size:13px; font-weight:800; color:#0B1F3A; margin:36px 0 12px;\">Upcoming<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:9px;\">\n            <sc-for list=\"{{ calList }}\" as=\"ev\" hint-placeholder-count=\"6\">\n              <div style=\"background:#fff; border:1px solid #EEF2F7; border-radius:12px; padding:13px 14px; display:flex; gap:11px;\">\n                <span style=\"width:42px; text-align:center; flex:none;\"><div style=\"font-size:9.5px; font-weight:700; color:#94A3B8;\">JUN<\u002Fdiv><div style=\"font-size:18px; font-weight:800; color:{{ ev.color }};\">{{ ev.day }}<\u002Fdiv><\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:12.5px; font-weight:700; color:#0B1F3A;\">{{ ev.title }}<\u002Fdiv><div style=\"font-size:10.5px; color:#94A3B8; margin-top:2px;\">{{ ev.type }} · {{ ev.case }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== COPILOT (full page) ===================== -->\n      <sc-if value=\"{{ isCopilot }}\" hint-placeholder-val=\"\">\n      <div class=\"ens-pad\" style=\"padding:28px 34px 60px; max-width:840px; margin:0 auto;\">\n        <div style=\"text-align:center; margin-bottom:24px;\">\n          <div style=\"width:54px; height:54px; border-radius:15px; background:linear-gradient(135deg,#38BDF8,#1E88E5); display:flex; align-items:center; justify-content:center; margin:0 auto 12px;\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2l2.2 5.8L20 10l-5.8 2.2L12 18l-2.2-5.8L4 10l5.8-2.2L12 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"font-size:23px; font-weight:800; color:#0B1F3A;\">ENSERA Copilot<\u002Fdiv>\n          <div style=\"font-size:13.5px; color:#94A3B8; margin-top:3px;\">Ask anything across your cases. Every answer includes sources, confidence and recommended next actions.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:8px;\">\n          <button onclick=\"{{ askCopilot }}\" data-q=\"What should I do next?\" style=\"text-align:left; font-family:inherit; background:#fff; border:1px solid #EEF2F7; border-radius:13px; padding:15px 17px; cursor:pointer;\"><div style=\"font-size:13.5px; font-weight:700; color:#0B1F3A;\">What should I do next?<\u002Fdiv><div style=\"font-size:11.5px; color:#94A3B8; margin-top:3px;\">Prioritized next action across cases<\u002Fdiv><\u002Fbutton>\n          <button onclick=\"{{ askCopilot }}\" data-q=\"Why is Schmidt GmbH blocked?\" style=\"text-align:left; font-family:inherit; background:#fff; border:1px solid #EEF2F7; border-radius:13px; padding:15px 17px; cursor:pointer;\"><div style=\"font-size:13.5px; font-weight:700; color:#0B1F3A;\">Why is this case blocked?<\u002Fdiv><div style=\"font-size:11.5px; color:#94A3B8; margin-top:3px;\">Explain blockers with sources<\u002Fdiv><\u002Fbutton>\n          <button onclick=\"{{ askCopilot }}\" data-q=\"Which customers need follow-up today?\" style=\"text-align:left; font-family:inherit; background:#fff; border:1px solid #EEF2F7; border-radius:13px; padding:15px 17px; cursor:pointer;\"><div style=\"font-size:13.5px; font-weight:700; color:#0B1F3A;\">Which customers need follow-up?<\u002Fdiv><div style=\"font-size:11.5px; color:#94A3B8; margin-top:3px;\">Today's follow-up list<\u002Fdiv><\u002Fbutton>\n          <button onclick=\"{{ askCopilot }}\" data-q=\"Draft a message to the customer\" style=\"text-align:left; font-family:inherit; background:#fff; border:1px solid #EEF2F7; border-radius:13px; padding:15px 17px; cursor:pointer;\"><div style=\"font-size:13.5px; font-weight:700; color:#0B1F3A;\">Draft a customer message<\u002Fdiv><div style=\"font-size:11.5px; color:#94A3B8; margin-top:3px;\">Prepared for your approval<\u002Fdiv><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"text-align:center; margin-top:18px;\"><button onclick=\"{{ toggleCopilot }}\" style=\"font-family:inherit; font-size:13px; font-weight:700; color:#fff; background:#1E88E5; border:none; border-radius:11px; padding:12px 24px; cursor:pointer;\">Open Copilot chat<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== TEMPLATES & WORKFLOWS ===================== -->\n      <sc-if value=\"{{ isTemplates }}\" hint-placeholder-val=\"\">\n      <div class=\"ens-pad\" style=\"padding:28px 34px 60px; max-width:1240px;\">\n        <div style=\"font-size:22px; font-weight:800; color:#0B1F3A;\">Templates &amp; Workflows<\u002Fdiv>\n        <div style=\"font-size:13px; color:#94A3B8; margin:3px 0 22px;\">Customize ENSERA to match how your office works. Choose which agents support each step and how much they prepare.<\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 300px; gap:18px;\">\n          <div>\n            <!-- workflow chain -->\n            <div style=\"background:#fff; border:1px solid #EEF2F7; border-radius:16px; padding:22px; margin-bottom:18px;\">\n              <div style=\"display:flex; align-items:center; margin-bottom:16px;\"><div style=\"font-size:14px; font-weight:800; color:#0B1F3A; flex:1;\">Active workflow — {{ activeTemplate }}<\u002Fdiv><button style=\"background:#F4F8FC; border:1px solid #E2EAF3; color:#0B1F3A; font-family:inherit; font-size:12px; font-weight:700; padding:8px 14px; border-radius:9px; cursor:pointer;\">Customize Workflow<\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:7px;\">\n                <sc-for list=\"{{ workflowChain }}\" as=\"w\" hint-placeholder-count=\"6\">\n                  <span style=\"font-size:12px; font-weight:700; color:#1E5B94; background:#E0F0FE; border:1px solid #BFDEFA; border-radius:9px; padding:8px 13px;\">{{ w.name }}<\u002Fspan>\n nt-size:13px; font-weight:800; color:#0B1F3A; margin-bottom:12px;\">Workflow templates<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <sc-for list=\"{{ templateCards }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <button onclick=\"{{ pickTemplate }}\" data-t=\"{{ t.name }}\" style=\"text-align:left; font-family:inherit; background:{{ t.bg }}; border:1.5px solid {{ t.border }}; border-radius:12px; padding:13px 15px; cursor:pointer; display:flex; align-items:center; gap:10px;\">\n                  <span style=\"flex:1; font-size:13px; font-weight:700; color:#0B1F3A;\">{{ t.name }}<\u002Fspan>\n                  <sc-if value=\"{{ t.check }}\" hint-placeholder-val=\"\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l4 4L19 7\" stroke=\"#1E88E5\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fsc-if>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:16px;\">\n              <button style=\"font-family:inherit; font-size:12.5px; font-weight:700; color:#fff; background:#1E88E5; border:none; border-radius:10px; padding:10px; cursor:pointer;\">Save workflow<\u002Fbutton>\n              <button style=\"font-family:inherit; font-size:12.5px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:10px; padding:10px; cursor:pointer;\">Duplicate template<\u002Fbutton>\n              <button style=\"font-family:inherit; font-size:12.5px; font-weight:700; color:#64748B; background:#fff; border:1px solid #E2EAF3; border-radius:10px; padding:10px; cursor:pointer;\">Reset to default<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== th.openAct }}\" style=\"display:flex; align-items:center; gap:11px; background:#F9FBFD; border:1px solid #EEF2F7; border-radius:11px; padding:8px; cursor:pointer;\">\n                      <span style=\"width:48px; height:42px; border-radius:8px; flex:none; background:radial-gradient(circle at 60% 40%, {{ th.tone2 }} 0%, #DC2626 26%, #7C3AED 56%, {{ th.tone1 }} 100%); box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);\"><\u002Fspan>\n                      <div style=\"flex:1; min-width:0;\">\n                        <div style=\"font-size:12px; font-weight:700; color:#0B1F3A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ th.file }}<\u002Fdiv>\n                        <div style=\"font-size:11px; color:#1E88E5; font-weight:600; margin-top:1px;\">{{ th.client }}<\u002Fdiv>\n                        <div style=\"font-size:10px; color:#94A3B8; margin-top:1px;\">{{ th.when }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none; color:#CBD5E1;\"><path d=\"M9 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ m.hasConfidence }}\" hint-placeholder-val=\"\">\n                <div style=\"display:flex; align-items:center; gap:8px; margin-top:9px; flex-wrap:wrap;\">\n                  <span style=\"font-size:10px; font-weight:700; color:#15803D; background:#DCFCE7; padding:2px 8px; border-radius:6px;\">Confidence: {{ m.confidence }}<\u002Fspan>\n                  <span style=\"font-size:10px; color:#94A3B8;\">{{ m.sources }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ m.hasActions }}\" hint-placeholder-val=\"\">\n                <div style=\"display:flex; flex-wrap:wrap; ga emoStep:-1, copilotMessages: this.initialCopilotMessages() }); };\n  toggleCaptions = () => this.setState(s => ({ captionsOn: !s.captionsOn }));\n  clearDemoTimer(){ if (this.demoTimer) { clearTimeout(this.demoTimer); this.demoTimer=null; } }\n  componentWillUnmount(){ this.clearDemoTimer(); }\n\n  spot(name){\n    if (!this.state.demoRunning || this.state.demoFinished) return '';\n    const steps = this.demoSteps(); const st = steps[this.state.demoStep];\n    if (st && st.highlight === name) return 'outline:3px solid #1E88E5; outline-offset:5px; border-radius:18px; box-shadow:0 0 0 6px rgba(30,136,229,.12);';\n    return '';\n  }\n\n  // ---------- RENDER ----------\n  renderVals() {\n    const s = this.state;\n    const route = s.route;\n    const titles = this.pageTitles();\n    const cases = this.cases();\n    const today = 'Monday, 29 June 2026';\n\n    // nav\n    const navItems = this.navConfig().map(n => {\n      const active = (route === n.route) || (route==='case' && n.route==='cases') || (route==='newcase' && n.route==='cases');\n      return { ...n,\n        bg: active ? '#F4F8FC' : 'transparent',\n        color: active ? '#0B1F3A' : '#64748B',\n        weight: active ? 700 : 500,\n        bar: active ? '#1E88E5' : 'transparent',\n        iconColor: active ? '#1E88E5' : '#94A3B8',\n        badge: n.route==='approvals' ? String(this.approvals().filter(a=>!s.approvalStatus[a.id]).length) : '',\n      };\n    });\n\n    // digest\n    const statusOrder = ['schmidt','becker','weber','neumann','muller'];\n    const casesStatusDigest = statusOrder.map(id => { const c=cases.find(x=>x.id===id); const rc=this.rdColors(c.readiness); const sc=this.stColors(c.status); return { id:c.id, name:c.name, readiness:c.readiness, status:c.status, sub:c.sub, nextAction:c.nextAction, rdFg:rc.fg, rdBg:rc.bg, stFg:sc.fg, stBg:sc.bg }; }).slice(0,2);\n    const blockedDigest = casesStatusDigest;\n    const followNames = ['Becker House','Neumann Apartment','Schmidt GmbH'];\n    const followReasons = ['No reply for 6 days','Missing building photos','Correction needed'];\n    const followupsAll = followNames.map((n,i) => ({ name:n, reason:followReasons[i], idx:i, delegated:s.followupDelegated[i],\n      toggleBg: s.followupDelegated[i] ? '#1E88E5' : '#D7E1EC', knobLeft: s.followupDelegated[i] ? '19px' : '2px',\n      label:'Delegate to ENSERA', labelColor: s.followupDelegated[i] ? '#1E88E5' : '#94A3B8' }));\n    const followups = followupsAll.slice(0,2);\n    const delegatedCount = s.followupDelegated.filter(Boolean).length || 3;\n\n    const allApprovals = this.approvals().map(a => ({ ...a, status: s.approvalStatus[a.id] }));\n    // exclude the follow-up email kind from the digest — it duplicates the Follow-ups column\n    const approvalsDigest = allApprovals.filter(a=>!a.status && a.kind!=='email').slice(0,2);\n    const pendingApprovalCount = allApprovals.filter(a=>!a.status).length;\n\n    const regs = this.regulationsData().slice(0,1).map(r => ({ ...r, affectsLabel: r.affects.join(', '), affectsCount: r.affects.length }));\n    const allRegs = this.regulationsData().map(r => ({ ...r, affectsLabel: r.affects.join(', '), affectsCount: r.affects.length, pathColor: r.path==='BAFA'?'#1E88E5':(r.path==='KfW'?'#7C3AED':'#0EA5E9') }));\n\n    const rankedCases = cases.map(c => { const rc=this.rdColors(c.readiness); const sc=this.stColors(c.status); return { ...c,\n      rdFg:rc.fg, rdBg:rc.bg, barColor:rc.bar, barWidth:c.readiness+'%', stFg:sc.fg, stBg:sc.bg,\n      blockerCount: c.blockers.length, blockerColor: c.blockers.length? '#EF4444':'#22C55E' }; });\n\n    // CASES PAGE\n    const filterDefs = [['all','All cases'],['Blocked','Blocked'],['Waiting','Waiting'],['Needs review','Needs review'],['Missing data','Missing data'],['Ready','Ready']];\n    const filterChips = filterDefs.map(([f,label])=>({ f, label, bg: s.casesFilter===f?'#0B1F3A':'#fff', color: s.casesFilter===f?'#fff':'#64748B', border: s.casesFilter===f?'#0B1F3A':'#E2EAF3' }));\n    const q = (s.casesSearch||'').toLowerCase();\n    const pathDefs = [['all','All paths'],['BAFA Einzelma\\u00dfnahme','BAFA Einzelma\\u00dfnahme'],['KfW Effizienzhaus','KfW Effizienzhaus'],['iSFP Bonus','iSFP Bonus'],['Combination case','Combination case']];\n    const pathChips = pathDefs.map(([p,label])=>({ p, label, bg: s.pathFilter===p?'#4F46E5':'#fff', color: s.pathFilter===p?'#fff':'#475569', border: s.pathFilter===p?'#4F46E5':'#E2EAF3' }));\n    const casesFiltered = rankedCases.filter(c => (s.casesFilter==='all'||c.status===s.casesFilter) && (s.pathFilter==='all'||c.path===s.pathFilter) && (!q||c.name.toLowerCase().includes(q)||c.path.toLowerCase().includes(q)));\n\n    // CASE DETAIL\n    let caseObj = null, caseTabs = [], caseChecklist = [], caseMilestones = [], caseDocuments = [];\n    if (s.caseId) {\n      const c = cases.find(x=>x.id===s.caseId);\n      if (c) {\n        const rc=this.rdColors(c.readiness), sc=this.stColors(c.status);\n        const circ = 251.3; const dl = c.deadline.split(' ');\n        const items0 = this.pathChecklist(c.path); const passedN = Math.round(c.readiness/100*items0.length);\n        caseObj = { ...c, rdFg:rc.fg, rdBg:rc.bg, barColor:rc.bar, barWidth:c.readiness+'%', stFg:sc.fg, stBg:sc.bg, band:this.rdBand(c.readiness), blockerCount:c.blockers.length, blockersList:c.blockers.map(b=>({text:b})), hasBlockers:c.blockers.length>0,\n          ringDash: (c.readiness/100*circ).toFixed(1)+' '+circ, passedCount: passedN,\n          deadlineMonth: dl[0].toUpperCase(), deadlineDay: dl[1].replace(',',''),\n          subStatus: c.blockers.length>0 ? 'Not ready' : 'Ready for final review', subFg: c.blockers.length>0 ? '#B91C1C' : '#15803D' };\n        caseTabs = [['overview','Overview'],['setup','Case Setup'],['documents','Documents'],['checks','Document Checks'],['milestones','Milestones'],['comms','Communication'],['calendar','Calendar'],['submission','Submission Preparation']].map(([k,l])=>({ k, l, color:s.caseTab===k?'#0B1F3A':'#64748B', border:s.caseTab===k?'#1E88E5':'transparent', weight:s.caseTab===k?700:600 }));\n        const items = this.pathChecklist(c.path);\n        const doneN = Math.round(c.readiness/100*items.length);\n        caseChecklist = items.map((t,i)=>({ text:t, done:i<doneN, icon:i<doneN?'\\u2713':'', iconBg:i<doneN?'#DCFCE7':'#F1F5F9', iconColor:i<doneN?'#15803D':'#CBD5E1' }));\n        const ms = this.milestoneList(); const curIdx = Math.max(0, ms.findIndex(m=>c.milestone.toLowerCase().includes(m.toLowerCase().split(' ')[0])));\n        caseMilestones = ms.map((m,i)=>({ name:m, state: i<curIdx?'done':(i===curIdx?'current':'upcoming'), dot: i<curIdx?'#22C55E':(i===curIdx?'#1E88E5':'#D7E1EC'), color: i<=curIdx?'#0B1F3A':'#94A3B8', line: i<curIdx?'#22C55E':'#E2EAF3' }));\n        caseDocuments = this.caseDocs(c.name).map(d=>{ const dc=this.stColors(d.status); return { ...d, stFg:dc.fg, stBg:dc.bg }; });\n      }\n    }\n    const ct = s.caseTab;\n\n    // DOCUMENTS\n    const docs = this.documentsData().map(d=>{ const sc=this.stColors(d.status); return { ...d, stFg:sc.fg, stBg:sc.bg, dot: d.status==='Passed'?'#22C55E':(d.status==='Failed'?'#EF4444':'#F59E0B'), isFailed: d.status!=='Passed' }; });\n    const docStats = [\n      { label:'Passed', value:9, fg:'#15803D', bg:'#ECFDF3', border:'#BBF7D0' },\n      { label:'Needs review', value:3, fg:'#B45309', bg:'#FEF6E7', border:'#FDE68A' },\n      { label:'Failed', value:2, fg:'#B91C1C', bg:'#FEF2F2', border:'#FECACA' },\n    ];\n    let openDocObj = null;\n    if (s.openDocId) { const d=this.documentsData().find(x=>x.id===s.openDocId); if(d){ const sc=this.stColors(d.status); openDocObj={ ...d, stFg:sc.fg, stBg:sc.bg, ...d.detail }; } }\n\n    // APPROVALS (master-detail)\n    const confColors = (c)=> c==='High' ? {fg:'#15803D',bg:'#DCFCE7'} : {fg:'#B45309',bg:'#FEF3C7'};\n    const approvalCards = allApprovals.map(a=>{ const sc=confColors(a.confidence); return { ...a, isApproved:a.status==='approved', isRejected:a.status==='rejected', isPending:!a.status, confFg:sc.fg, confBg:sc.bg, icon:this.approvalIcon(a.kind),\n      statusLabel: a.status==='approved'?'Approved':(a.status==='rejected'?'Rejected':'Pending'),\n      statusColor: a.status==='approved'?'#15803D':(a.status==='rejected'?'#B91C1C':'#94A3B8') }; });\n    const approvedCount = allApprovals.filter(a=>a.status==='approved').length;\n    const rejectedCount = allApprovals.filter(a=>a.status==='rejected').length;\n    // pending list for left column\n    const pendingList = approvalCards.filter(a=>a.isPending).map(a=>({ ...a, selBg: a.id===s.selectedApprovalId?'#EFF6FF':'transparent', selBorder: a.id===s.selectedApprovalId?'#1E88E5':'transparent' }));\n    // selected detail (fallback to first pending, then first)\n    let selObj = approvalCards.find(a=>a.id===s.selectedApprovalId);\n    if (!selObj || !selObj.isPending) selObj = approvalCards.find(a=>a.isPending) || approvalCards[0];\n    const selectedApproval = selObj ? { ...selObj } : null;\n\n    // CALENDAR (June 2026 — June 1 is a Monday)\n    const calEvents = this.calendarEvents();\n    const firstDow = (new Date(2026,5,1).getDay()+6)%7; // Mon=0\n    const calCells = [];\n    for (let i=0;i<firstDow;i++) calCells.push({ blank:true });\n    for (let d=1; d<=30; d++) { const evs=calEvents.filter(e=>e.day===d); calCells.push({ blank:false, day:d, isToday:d===29, events:evs, hasEvents:evs.length>0, cellBg:d===29?'#EFF6FF':'#FBFDFF', cellBorder:d===29?'#BFDEFA':'#F0F4F9', dayColor:d===29?'#1E88E5':'#64748B' }); }\n    const calList = calEvents.map(e=>({ ...e, dateLabel:'Jun '+e.day }));\n\n    // TEMPLATES\n    const moduleCards = s.modules.map((m,i)=>({ ...m, idx:i, toggleBg:m.on?'#1E88E5':'#D7E1EC', knobLeft:m.on?'19px':'2px', opacity:m.on?1:0.42, color:m.on?'#0B1F3A':'#94A3B8' }));\n    const workflowChain = s.modules.filter(m=>m.on).map((m,i)=>({ name:m.name, last:false, notLast:true }));\n    workflowChain.forEach((w,i)=>{ w.last = i===workflowChain.length-1; w.notLast = i!==workflowChain.length-1; });\n    const folderList = ['Client Information','Building Data','Funding Path','Uploaded Documents','Planning Exports','Communication','Submission Preparation','Archive'];\n    const templateNames = ['Solo consultant default','Residential BAFA cases','KfW projects','iSFP Bonus cases','High-complexity office workflow'];\n    const templateCards = templateNames.map(t=>({ name:t, active:s.activeTemplate===t, bg:s.activeTemplate===t?'#EFF6FF':'#fff', border:s.activeTemplate===t?'#1E88E5':'#EEF2F7', check:s.activeTemplate===t }));\n\n    // SETTINGS\n    const agentCards = s.agents.map((a,i)=>({ ...a, idx:i, toggleBg:a.on?'#22C55E':'#D7E1EC', knobLeft:a.on?'19px':'2px', statusLabel:a.on?'ON':'OFF', statusColor:a.on?'#15803D':'#94A3B8', statusBg:a.on?'#DCFCE7':'#F1F5F9', approvalLabel:a.approval?'Yes':'No', approvalColor:a.approval?'#B45309':'#94A3B8', opacity:a.on?1:0.55 }));\n    const autonomyOpts = this.autonomyLevels();\n    const gateMap = [\n      ['Send customer email','Follow-up Preparation Agent'],\n      ['Change case status','Readiness Scoring Agent'],\n      ['Mark case submission-ready','Submission Preparation Agent'],\n      ['Apply regulation update to active case','Regulation Monitoring Agent'],\n      ['Create final submission package','Submission Preparation Agent'],\n      ['Close a blocker','Document Validation Agent'],\n    ];\n    const approvalGates = gateMap.filter(([g,an])=>{ const ag=s.agents.find(x=>x.name===an); return ag && ag.on; }).map(([g,an])=>({ label:g, source:an }));\n    const pathOptions = ['BAFA Einzelma\\u00dfnahme','KfW Effizienzhaus','iSFP / iSFP Bonus','Combination case'];\n\n    // copilot\n    const copilotSuggestions = ['What should I do next?','Which customers need follow-up today?'];\n\n    // demo\n    const steps = this.demoSteps();\n    const demoStepObj = steps[s.demoStep];\n    const curLine = demoStepObj ? demoStepObj.line : -1;\n    const demoProgress = s.demoFinished ? '100%' : (curLine < 0 ? '0%' : Math.round(((curLine+1)/5)*100) + '%');\n\n    return {\n      // routing\n      route,\n      isDashboard: route==='dashboard', isCases: route==='cases', isDocuments: route==='documents',\n      isCalendar: route==='calendar', isApprovals: route==='approvals', isCopilot: route==='copilot',\n      isTemplates: route==='templates', isSettings: route==='settings', isCase: route==='case', isNewCase: route==='newcase',\n      pageTitle: route==='case' ? (cases.find(c=>c.id===s.caseId)||{}).name || 'Case' : (titles[route]||['ENSERA',''])[0],\n      pageSub: route==='case' ? 'Case workspace' : (titles[route]||['',''])[1],\n      navItems,\n      today,\n      // digest\n      blockedDigest, casesStatusDigest, followups, delegatedCount, approvalsDigest, pendingApprovalCount,\n      followupCount: 3, approvalsCount: pendingApprovalCount, casesStatusCount: cases.length, regCount: regs.length, regTotal: this.regulationsData().length, regulations: regs,\n      allRegs, showAllRegs: s.showAllRegs, openAllRegs: this.openAllRegs, closeAllRegs: this.closeAllRegs, stop: this.stop,\n      rankedCases,\n      // cases page\n      filterChips, pathChips, casesFiltered, casesSearch: s.casesSearch, casesEmpty: casesFiltered.length===0,\n      // case detail\n      caseObj, caseTabs, caseChecklist, caseMilestones, caseDocuments, folderList,\n      tabOverview: ct==='overview', tabSetup: ct==='setup', tabDocuments: ct==='documents', tabChecks: ct==='checks',\n      tabMilestones: ct==='milestones', tabComms: ct==='comms', tabCalendar: ct==='calendar', tabSubmission: ct==='submission',\n      // documents\n      docs, docStats, openDocObj, hasOpenDoc: !!openDocObj,\n      // approvals\n      approvalCards, approvedCount, rejectedCount, pendingList, selectedApproval, noPending: pendingList.length===0,\n      // responsive / drawer\n      drawerOpen: s.drawerOpen, sidebarClass: s.drawerOpen ? 'ens-open' : '',\n      // calendar\n      calCells, calList,\n      // templates\n      moduleCards, workflowChain, templateCards, activeTemplate: s.activeTemplate,\n      // settings\n      agentCards, autonomyOpts, approvalGates, modules: s.modules,\n      // new case\n      newCase: s.newCase, pathOptions,\n      // handlers (page-specific)\n      setFilter: this.setFilter, onSearch: this.onSearch, openCase: this.openCase, setTab: this.setTab,\n      goNewCase: this.goNewCase, ncField: this.ncField, createCase: this.createCase,\n      openDoc: this.openDoc, closeDoc: this.closeDoc, askCopilotDoc: this.askCopilotDoc,\n      setPathFilter: this.setPathFilter, selectApproval: this.selectApproval, toggleDrawer: this.toggleDrawer, closeDrawer: this.closeDrawer,\n      toggleAgent: this.toggleAgent, setAutonomy: this.setAutonomy, toggleModule: this.toggleModule, pickTemplate: this.pickTemplate,\n      // copilot\n      copilotOpen: s.copilotOpen, copilotClosed: !s.copilotOpen,\n      copilotMessages: s.copilotMessages || this.initialCopilotMessages(), copilotInput: s.copilotInput, copilotContext: s.copilotContext,\n      copilotSuggestions,\n      // demo\n      demoRunning: s.demoRunning, demoFinished: s.demoFinished,\n      demoActive: s.demoRunning && !s.demoFinished && s.demoStep>=0,\n      demoCaption: demoStepObj ? demoStepObj.caption : '', demoStepLabel: demoStepObj ? demoStepObj.label : '',\n      demoProgress, captionsOn: s.captionsOn, captionsLabel: s.captionsOn?'on':'off',\n      captionsToggleBg: s.captionsOn ? '#38BDF8' : 'rgba(255,255,255,.25)', captionsKnobLeft: s.captionsOn ? '16px':'2px',\n      captionIconColor: s.captionsOn ? '#38BDF8' : '#64748B',\n      ringGreeting: this.spot('greeting'), ringDigest: this.spot('digest'),\n      ringFollowups: this.spot('col-followups'), ringColApprovals: this.spot('col-approvals'), ringColCases: this.spot('col-cases'), ringColRegulation: this.spot('col-regulation'),\n      ringCasehdr: this.spot('casehdr'), ringCopilot: this.spot('copilot'), ringChecks: this.spot('checks'),\n      // handlers\n      navTo: this.navTo, goDashboard: this.goDashboard, goCases: this.goCases, goApprovals: this.goApprovals,\n      openCaseEvt: this.openCaseEvt, toggleDelegate: this.toggleDelegate, approveItem: this.approveItem, rejectItem: this.rejectItem,\n      toggleCopilot: this.toggleCopilot, onCopilotInput: this.onCopilotInput, onCopilotKey: this.onCopilotKey,\n      sendCopilot: this.sendCopilot, askCopilot: this.askCopilot, copilotAction: this.copilotAction, openCopilotReg: this.openCopilotReg,\n      startDemo: this.startDemo, nextDemoStep: this.nextDemoStep, stopDemo: this.stopDemo, toggleCaptions: this.toggleCaptions,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
